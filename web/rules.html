<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>幸运扫雷 · 规则说明</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page page-rules">
        <div class="card">
            <header class="page-header">
                <div>
                    <h1>游戏规则</h1>
                </div>
            </header>

            <section class="rule-section">
                <h2>1. 探索棋盘：下注你的判断</h2>
                <p>游戏开始时，30颗地雷已在8×8的格子中随机分布。每一轮你都可以任意选择一个格子。</p>
                <p>选中安全格子时，连击数会累加，经济收益也会随之提升。</p>
                <p>一旦踩中地雷，连击数会立即重置，地雷也将重新分布。</p>
            </section>

            <section class="rule-section">
                <h2>2. 道具商店：为胜利加码</h2>
                <p>每次成功都会收获经济奖励，可消耗经济购买多种道具提升胜算。</p>
            </section>

            <section class="rule-section">
                <h2>3. 胜负终局</h2>
                <p>只要连续选中 8 个安全格子，胜利的号角就会吹响；而踩中地雷从不是终点，只是让你重新规划路线，直到拿下 8 连击的胜利！</p>
            </section>

            <section class="rule-section">
                <h2>4. 温馨提示</h2>
                <p>本游戏大约耗时十分钟左右，请享受每一次选择的快乐！</p>
            </section>
        </div>

        <footer class="page-footer">
            <a class="button button-secondary" href="index.html">返回主界面</a>
        </footer>
    </main>
</body>
</html>
